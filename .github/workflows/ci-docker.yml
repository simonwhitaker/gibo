name: "CI: Test docker build"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile Go version sync
        run: ./tools/sync-go-version.sh --check

      - name: Docker build
        run: docker build -t gibo:latest .
